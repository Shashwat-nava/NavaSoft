services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=nava
      - POSTGRES_USER=nava
      - POSTGRES_PASSWORD=nava
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  mlserver:
    build:
      context: ./mlserver
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
    environment:
      - MLSERVER_PORT=50051
      - MLSERVER_WORKERS=2
      - MODEL_PATH=./models/yolox_voc_m.onnx
      - DEVICE=cuda              # "cpu" or "cuda"
      - GPU_DEVICE_ID=0       # uncomment for multi-GPU selection
    volumes:
      - ./mlserver/models:/app/models:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        # Uncomment below for GPU (requires nvidia-container-toolkit)
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MLSERVER_ADDR=mlserver:50051
      - DATABASE_URL=postgres://nava:nava@postgres:5432/nava?sslmode=disable
    volumes:
      - backend-uploads:/app/uploads
      - backend-processed:/app/processed_videos
    depends_on:
      - postgres
      - mlserver
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
  backend-uploads:
  backend-processed:
